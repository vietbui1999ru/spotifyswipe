# SpotiSwipe - Ansible Inventory
# For Terraform-managed hosts, regenerate with:
#   terraform output -raw ansible_inventory > inventory/hosts.yml
#
# This file serves as a reference / manual fallback.

all:
  children:
    app_servers:
      hosts:
        spotiswipe-app-1:
          ansible_host: 10.0.0.11
        spotiswipe-app-2:
          ansible_host: 10.0.0.12

    lb_servers:
      hosts:
        spotiswipe-lb:
          ansible_host: 10.0.0.10

    db_servers:
      hosts:
        spotiswipe-db:
          ansible_host: 10.0.0.20

  vars:
    ansible_python_interpreter: /usr/bin/python3
    ansible_user: ubuntu
