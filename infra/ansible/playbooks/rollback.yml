---
# rollback.yml - Rollback to the previous release
#
# Reads the previous release path from shared/previous_release
# and switches the current symlink back, then restarts.
#
# Usage:
#   ansible-playbook playbooks/rollback.yml
#   ansible-playbook playbooks/rollback.yml --limit spotiswipe-app-1

- name: Rollback SpotiSwipe to previous release
  hosts: app_servers
  become: yes
  serial: 1

  tasks:
    - name: Read previous release path
      ansible.builtin.slurp:
        src: "{{ app_deploy_dir }}/shared/previous_release"
      register: previous_release_file

    - name: Set previous release fact
      ansible.builtin.set_fact:
        previous_release: "{{ previous_release_file.content | b64decode | trim }}"

    - name: Verify previous release directory exists
      ansible.builtin.stat:
        path: "{{ previous_release }}"
      register: prev_dir

    - name: Fail if previous release not found
      ansible.builtin.fail:
        msg: "Previous release directory does not exist: {{ previous_release }}"
      when: not prev_dir.stat.exists

    - name: Display rollback target
      ansible.builtin.debug:
        msg: "Rolling back to: {{ previous_release }}"

    - name: Update current symlink to previous release
      ansible.builtin.file:
        src: "{{ previous_release }}"
        dest: "{{ app_deploy_dir }}/current"
        state: link
        force: yes
        owner: "{{ deploy_user }}"
        group: "{{ deploy_group }}"

    - name: Restart application service
      ansible.builtin.systemd:
        name: "{{ systemd_service_name }}"
        state: restarted

    - name: Wait for application to be healthy
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ app_port }}/"
        status_code: [200, 301, 302]
        timeout: 5
      register: health_check
      retries: "{{ health_check_retries }}"
      delay: "{{ health_check_delay }}"
      until: health_check.status in [200, 301, 302]

    - name: Rollback successful
      ansible.builtin.debug:
        msg: "Rollback complete on {{ inventory_hostname }}. Running: {{ previous_release }}"
