---
# site.yml - Master playbook: full server setup from scratch
#
# Usage:
#   ansible-playbook playbooks/site.yml
#   ansible-playbook playbooks/site.yml --ask-vault-pass
#   ansible-playbook playbooks/site.yml --limit app_servers

# --- Phase 1: Base configuration on all hosts ---
- name: Configure all servers (common setup)
  hosts: all
  become: yes
  roles:
    - common

# --- Phase 2: Database server ---
- name: Configure database server
  hosts: db_servers
  become: yes
  roles:
    - postgresql

# --- Phase 3: Application servers ---
- name: Configure application servers
  hosts: app_servers
  become: yes
  roles:
    - nodejs
    - app

# --- Phase 4: Load balancer ---
- name: Configure load balancer
  hosts: lb_servers
  become: yes
  roles:
    - ssl
    - nginx
