---
# postgresql/tasks/main.yml - Install and configure PostgreSQL

- name: Add PostgreSQL APT key
  ansible.builtin.apt_key:
    url: https://www.postgresql.org/media/keys/ACCC4CF8.asc
    state: present

- name: Add PostgreSQL APT repository
  ansible.builtin.apt_repository:
    repo: "deb https://apt.postgresql.org/pub/repos/apt {{ ansible_distribution_release }}-pgdg main"
    filename: pgdg
    state: present

- name: Install PostgreSQL {{ postgresql_version }}
  ansible.builtin.apt:
    name:
      - "postgresql-{{ postgresql_version }}"
      - "postgresql-client-{{ postgresql_version }}"
      - python3-psycopg2
    state: present
    update_cache: yes

- name: Ensure PostgreSQL is started and enabled
  ansible.builtin.systemd:
    name: postgresql
    enabled: yes
    state: started

- name: Create application database
  community.postgresql.postgresql_db:
    name: "{{ db_name }}"
    encoding: UTF-8
    lc_collate: en_US.UTF-8
    lc_ctype: en_US.UTF-8
    state: present
  become: yes
  become_user: postgres

- name: Create application database user
  community.postgresql.postgresql_user:
    name: "{{ db_user }}"
    password: "{{ db_password }}"
    db: "{{ db_name }}"
    priv: ALL
    state: present
  become: yes
  become_user: postgres

- name: Configure pg_hba.conf for app server access
  ansible.builtin.lineinfile:
    path: "{{ postgresql_conf_dir }}/pg_hba.conf"
    line: "host {{ db_name }} {{ db_user }} {{ hostvars[item]['ansible_host'] }}/32 scram-sha-256"
    insertafter: "^# IPv4 local connections"
    state: present
  loop: "{{ groups['app_servers'] }}"
  notify: restart postgresql

- name: Set PostgreSQL listen addresses
  ansible.builtin.lineinfile:
    path: "{{ postgresql_conf_dir }}/postgresql.conf"
    regexp: "^#?listen_addresses"
    line: "listen_addresses = 'localhost,{{ ansible_host }}'"
    state: present
  notify: restart postgresql

- name: Tune PostgreSQL max_connections
  ansible.builtin.lineinfile:
    path: "{{ postgresql_conf_dir }}/postgresql.conf"
    regexp: "^#?max_connections"
    line: "max_connections = {{ postgresql_max_connections }}"
  notify: restart postgresql

- name: Tune PostgreSQL shared_buffers
  ansible.builtin.lineinfile:
    path: "{{ postgresql_conf_dir }}/postgresql.conf"
    regexp: "^#?shared_buffers"
    line: "shared_buffers = {{ postgresql_shared_buffers }}"
  notify: restart postgresql

- name: Tune PostgreSQL effective_cache_size
  ansible.builtin.lineinfile:
    path: "{{ postgresql_conf_dir }}/postgresql.conf"
    regexp: "^#?effective_cache_size"
    line: "effective_cache_size = {{ postgresql_effective_cache_size }}"
  notify: restart postgresql

- name: Tune PostgreSQL work_mem
  ansible.builtin.lineinfile:
    path: "{{ postgresql_conf_dir }}/postgresql.conf"
    regexp: "^#?work_mem"
    line: "work_mem = {{ postgresql_work_mem }}"
  notify: restart postgresql

- name: Create backup directory
  ansible.builtin.file:
    path: "{{ postgresql_backup_dir }}"
    state: directory
    owner: postgres
    group: postgres
    mode: "0700"
  when: postgresql_backup_enabled

- name: Deploy backup script
  ansible.builtin.template:
    src: pg_backup.sh.j2
    dest: /usr/local/bin/pg_backup.sh
    mode: "0755"
  when: postgresql_backup_enabled

- name: Create backup cron job
  ansible.builtin.cron:
    name: "PostgreSQL daily backup"
    user: postgres
    hour: "{{ postgresql_backup_hour }}"
    minute: "{{ postgresql_backup_minute }}"
    job: "/usr/local/bin/pg_backup.sh"
  when: postgresql_backup_enabled
