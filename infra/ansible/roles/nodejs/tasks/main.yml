---
# nodejs/tasks/main.yml - Install Bun runtime and Node.js LTS

- name: Install Bun for deploy user
  ansible.builtin.shell: |
    curl -fsSL https://bun.sh/install | bash
  args:
    creates: /home/{{ deploy_user }}/.bun/bin/bun
  become: yes
  become_user: "{{ deploy_user }}"
  environment:
    HOME: /home/{{ deploy_user }}

- name: Ensure Bun is on PATH system-wide
  ansible.builtin.copy:
    content: |
      export BUN_INSTALL="/home/{{ deploy_user }}/.bun"
      export PATH="$BUN_INSTALL/bin:$PATH"
    dest: /etc/profile.d/bun.sh
    mode: "0644"

- name: Symlink bun to /usr/local/bin for systemd
  ansible.builtin.file:
    src: /home/{{ deploy_user }}/.bun/bin/bun
    dest: /usr/local/bin/bun
    state: link
    force: yes

- name: Symlink bunx to /usr/local/bin for systemd
  ansible.builtin.file:
    src: /home/{{ deploy_user }}/.bun/bin/bunx
    dest: /usr/local/bin/bunx
    state: link
    force: yes

- name: Add NodeSource GPG key
  ansible.builtin.apt_key:
    url: https://deb.nodesource.com/gpgkey/nodesource-repo.gpg.key
    state: present

- name: Add NodeSource repository
  ansible.builtin.apt_repository:
    repo: "deb https://deb.nodesource.com/node_{{ node_major_version }}.x nodistro main"
    filename: nodesource
    state: present

- name: Install Node.js LTS
  ansible.builtin.apt:
    name: nodejs
    state: present
    update_cache: yes

- name: Verify Bun installation
  ansible.builtin.command: /usr/local/bin/bun --version
  register: bun_version_result
  changed_when: false

- name: Display Bun version
  ansible.builtin.debug:
    msg: "Bun version: {{ bun_version_result.stdout }}"

- name: Verify Node.js installation
  ansible.builtin.command: node --version
  register: node_version_result
  changed_when: false

- name: Display Node.js version
  ansible.builtin.debug:
    msg: "Node.js version: {{ node_version_result.stdout }}"
