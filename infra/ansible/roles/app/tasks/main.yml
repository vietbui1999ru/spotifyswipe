---
# app/tasks/main.yml - Deploy SpotiSwipe Next.js application

- name: Create application directory
  ansible.builtin.file:
    path: "{{ app_deploy_dir }}"
    state: directory
    owner: "{{ deploy_user }}"
    group: "{{ deploy_group }}"
    mode: "0755"

- name: Create releases directory
  ansible.builtin.file:
    path: "{{ app_deploy_dir }}/releases"
    state: directory
    owner: "{{ deploy_user }}"
    group: "{{ deploy_group }}"
    mode: "0755"

- name: Create shared directory for persistent data
  ansible.builtin.file:
    path: "{{ app_deploy_dir }}/shared"
    state: directory
    owner: "{{ deploy_user }}"
    group: "{{ deploy_group }}"
    mode: "0755"

- name: Set release timestamp
  ansible.builtin.set_fact:
    release_timestamp: "{{ ansible_date_time.iso8601_basic_short }}"

- name: Clone application repository
  ansible.builtin.git:
    repo: "{{ app_repo }}"
    dest: "{{ app_deploy_dir }}/releases/{{ release_timestamp }}"
    version: "{{ app_branch }}"
    depth: 1
    force: yes
  become: yes
  become_user: "{{ deploy_user }}"

- name: Deploy .env file
  ansible.builtin.template:
    src: env.j2
    dest: "{{ app_deploy_dir }}/releases/{{ release_timestamp }}/.env"
    owner: "{{ deploy_user }}"
    group: "{{ deploy_group }}"
    mode: "0600"

- name: Install dependencies with Bun
  ansible.builtin.command: /usr/local/bin/bun install --frozen-lockfile
  args:
    chdir: "{{ app_deploy_dir }}/releases/{{ release_timestamp }}"
  become: yes
  become_user: "{{ deploy_user }}"
  environment:
    HOME: /home/{{ deploy_user }}

- name: Generate Prisma client
  ansible.builtin.command: /usr/local/bin/bunx prisma generate
  args:
    chdir: "{{ app_deploy_dir }}/releases/{{ release_timestamp }}"
  become: yes
  become_user: "{{ deploy_user }}"
  environment:
    HOME: /home/{{ deploy_user }}

- name: Push Prisma schema to database
  ansible.builtin.command: /usr/local/bin/bunx prisma db push --skip-generate
  args:
    chdir: "{{ app_deploy_dir }}/releases/{{ release_timestamp }}"
  become: yes
  become_user: "{{ deploy_user }}"
  environment:
    HOME: /home/{{ deploy_user }}
  run_once: true

- name: Build application
  ansible.builtin.command: /usr/local/bin/bun run build
  args:
    chdir: "{{ app_deploy_dir }}/releases/{{ release_timestamp }}"
  become: yes
  become_user: "{{ deploy_user }}"
  environment:
    HOME: /home/{{ deploy_user }}
    NODE_ENV: production

- name: Update current symlink
  ansible.builtin.file:
    src: "{{ app_deploy_dir }}/releases/{{ release_timestamp }}"
    dest: "{{ app_deploy_dir }}/current"
    state: link
    force: yes
    owner: "{{ deploy_user }}"
    group: "{{ deploy_group }}"

- name: Deploy systemd service
  ansible.builtin.template:
    src: spotiswipe.service.j2
    dest: /etc/systemd/system/{{ systemd_service_name }}.service
    mode: "0644"
  notify: reload systemd

- name: Enable and start application service
  ansible.builtin.systemd:
    name: "{{ systemd_service_name }}"
    enabled: yes
    state: restarted
    daemon_reload: yes

- name: Wait for application to be healthy
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ app_port }}/"
    status_code: [200, 301, 302]
    timeout: 5
  register: health_check
  retries: "{{ health_check_retries }}"
  delay: "{{ health_check_delay }}"
  until: health_check.status in [200, 301, 302]

- name: Clean up old releases
  ansible.builtin.shell: |
    cd {{ app_deploy_dir }}/releases
    ls -dt */ | tail -n +{{ app_releases_keep + 1 }} | xargs -r rm -rf
  become: yes
  become_user: "{{ deploy_user }}"
  changed_when: false
