---
# common/tasks/main.yml - Base server configuration

- name: Set timezone
  community.general.timezone:
    name: "{{ timezone }}"

- name: Update apt cache and upgrade packages
  ansible.builtin.apt:
    update_cache: yes
    upgrade: safe
    cache_valid_time: 3600

- name: Install essential packages
  ansible.builtin.apt:
    name:
      - curl
      - wget
      - git
      - unzip
      - htop
      - ufw
      - fail2ban
      - logrotate
      - ca-certificates
      - gnupg
      - python3-pip
      - acl
    state: present

- name: Create deploy group
  ansible.builtin.group:
    name: "{{ deploy_group }}"
    state: present

- name: Create deploy user
  ansible.builtin.user:
    name: "{{ deploy_user }}"
    group: "{{ deploy_group }}"
    shell: /bin/bash
    create_home: yes
    state: present

- name: Add deploy user to sudoers (no password)
  ansible.builtin.lineinfile:
    path: /etc/sudoers.d/{{ deploy_user }}
    line: "{{ deploy_user }} ALL=(ALL) NOPASSWD:ALL"
    create: yes
    mode: "0440"
    validate: "visudo -cf %s"

- name: Configure UFW defaults
  community.general.ufw:
    state: enabled
    policy: deny
    direction: incoming

- name: Allow UFW outgoing by default
  community.general.ufw:
    policy: allow
    direction: outgoing

- name: Allow standard UFW ports
  community.general.ufw:
    rule: allow
    port: "{{ item.port }}"
    proto: "{{ item.proto }}"
  loop: "{{ ufw_allowed_ports }}"

- name: Allow extra UFW rules (role-specific)
  community.general.ufw:
    rule: allow
    port: "{{ item.port }}"
    proto: "{{ item.proto }}"
    from_ip: "{{ item.from }}"
  loop: "{{ ufw_extra_rules | default([]) }}"

- name: Configure fail2ban jail
  ansible.builtin.template:
    src: jail.local.j2
    dest: /etc/fail2ban/jail.local
    mode: "0644"
  notify: restart fail2ban

- name: Enable and start fail2ban
  ansible.builtin.systemd:
    name: fail2ban
    enabled: yes
    state: started

- name: Configure swap file
  when: swap_size_mb | int > 0
  block:
    - name: Check if swap file exists
      ansible.builtin.stat:
        path: /swapfile
      register: swap_file

    - name: Create swap file
      ansible.builtin.command: fallocate -l {{ swap_size_mb }}M /swapfile
      when: not swap_file.stat.exists

    - name: Set swap file permissions
      ansible.builtin.file:
        path: /swapfile
        mode: "0600"
      when: not swap_file.stat.exists

    - name: Format swap file
      ansible.builtin.command: mkswap /swapfile
      when: not swap_file.stat.exists

    - name: Enable swap file
      ansible.builtin.command: swapon /swapfile
      when: not swap_file.stat.exists

    - name: Add swap to fstab
      ansible.builtin.lineinfile:
        path: /etc/fstab
        line: "/swapfile none swap sw 0 0"
        state: present
