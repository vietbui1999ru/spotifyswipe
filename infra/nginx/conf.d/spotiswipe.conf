# SpotiSwipe - Site Configuration
# Reverse proxy + load balancer for Next.js application
# Managed by Ansible - do not edit manually on servers

upstream spotiswipe_backend {
    least_conn;
    server {{ app_server_1 | default('app-server-1') }}:{{ app_port | default(3000) }};
    server {{ app_server_2 | default('app-server-2') }}:{{ app_port | default(3000) }};
    keepalive 32;
}

# ---------- HTTP -> HTTPS redirect ----------
server {
    listen 80;
    listen [::]:80;
    server_name {{ domain }};

    # Let's Encrypt / ACME challenge
    location /.well-known/acme-challenge/ {
        root {{ nginx_webroot | default('/var/www/html') }};
    }

    location / {
        return 301 https://$server_name$request_uri;
    }
}

# ---------- Main HTTPS server ----------
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name {{ domain }};

    # --- SSL certificates ---
    ssl_certificate     {{ ssl_certificate_path | default('/etc/letsencrypt/live/' + domain + '/fullchain.pem') }};
    ssl_certificate_key {{ ssl_certificate_key_path | default('/etc/letsencrypt/live/' + domain + '/privkey.pem') }};
    include /etc/nginx/conf.d/ssl-params.conf;

    # --- Security headers ---
    include /etc/nginx/conf.d/security-headers.conf;

    # --- Logging ---
    access_log /var/log/nginx/spotiswipe_access.log main;
    error_log  /var/log/nginx/spotiswipe_error.log warn;

    # --- Health check endpoint ---
    location = /health {
        access_log off;
        return 200 'ok';
        add_header Content-Type text/plain;
    }

    # --- Next.js static assets (immutable, long cache) ---
    location /_next/static/ {
        proxy_pass http://spotiswipe_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        expires 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # --- Public static files ---
    location /favicon.ico {
        proxy_pass http://spotiswipe_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        access_log off;
    }

    # --- Auth API rate limiting ---
    location /api/auth/ {
        limit_req zone=auth_limit burst=20 nodelay;
        limit_req_status 429;

        proxy_pass http://spotiswipe_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        proxy_connect_timeout 10s;
        proxy_read_timeout    30s;
        proxy_send_timeout    30s;
    }

    # --- tRPC / general API rate limiting ---
    location /api/ {
        limit_req zone=api_limit burst=50 nodelay;
        limit_req_status 429;

        proxy_pass http://spotiswipe_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        proxy_connect_timeout 10s;
        proxy_read_timeout    60s;
        proxy_send_timeout    30s;
    }

    # --- Next.js HMR / WebSocket upgrade (dev only, remove in production) ---
    location /_next/webpack-hmr {
        proxy_pass http://spotiswipe_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400s;
    }

    # --- Default: proxy to Next.js ---
    location / {
        proxy_pass http://spotiswipe_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        # Failover: retry next upstream on error or timeout
        proxy_next_upstream error timeout http_502 http_503 http_504;
        proxy_next_upstream_tries 2;
        proxy_next_upstream_timeout 10s;

        proxy_connect_timeout 10s;
        proxy_read_timeout    60s;
        proxy_send_timeout    30s;

        # Request buffering
        proxy_request_buffering on;
        proxy_buffering on;
    }
}
