# SpotiSwipe - Security Headers
# Managed by Ansible - do not edit manually on servers

# Content Security Policy
# Allow: self, Spotify CDN (images/audio), Last.fm (images/API), Mantine fonts/styles, inline styles (Mantine)
add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://i.scdn.co https://mosaic.scdn.co https://lastfm.freetls.fastly.net https://lastfm-img2.akamaized.net; media-src 'self' https://p.scdn.co https://cdns-preview.dzcdn.net; font-src 'self' data:; connect-src 'self' https://api.spotify.com https://ws.audioscrobbler.com https://sdk.scdn.co; frame-src 'none'; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; upgrade-insecure-requests;" always;

# Prevent MIME-type sniffing
add_header X-Content-Type-Options "nosniff" always;

# Prevent clickjacking
add_header X-Frame-Options "DENY" always;

# XSS protection (legacy browsers)
add_header X-XSS-Protection "1; mode=block" always;

# Referrer policy
add_header Referrer-Policy "strict-origin-when-cross-origin" always;

# Permissions policy - disable unused browser features
add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), magnetometer=(), gyroscope=(), accelerometer=()" always;

# HSTS - enforce HTTPS for 1 year, include subdomains
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
