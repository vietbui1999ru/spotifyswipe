# SpotiSwipe - Main Nginx Configuration
# Managed by Ansible - do not edit manually on servers

user {{ nginx_user | default('www-data') }};
worker_processes auto;
pid /run/nginx.pid;
error_log /var/log/nginx/error.log warn;

events {
    worker_connections {{ nginx_worker_connections | default(1024) }};
    multi_accept on;
    use epoll;
}

http {
    # ---------- Basic ----------
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ---------- Logging ----------
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time uct=$upstream_connect_time urt=$upstream_response_time';

    access_log /var/log/nginx/access.log main;

    # ---------- Performance ----------
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    types_hash_max_size 2048;
    server_tokens off;

    # ---------- Client limits ----------
    client_max_body_size {{ nginx_client_max_body_size | default('10m') }};
    client_body_timeout  30s;
    client_header_timeout 30s;

    # ---------- Proxy buffer tuning ----------
    proxy_buffer_size       128k;
    proxy_buffers           4 256k;
    proxy_busy_buffers_size 256k;

    # ---------- Gzip ----------
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 4;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/json
        application/xml
        application/rss+xml
        application/atom+xml
        image/svg+xml
        font/woff2;

    # ---------- Rate limiting zones ----------
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate={{ nginx_auth_rate_limit | default('10r/s') }};
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate={{ nginx_api_rate_limit | default('30r/s') }};

    # ---------- Includes ----------
    include /etc/nginx/conf.d/*.conf;
}
